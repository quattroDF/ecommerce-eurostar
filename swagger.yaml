openapi: 3.0.3
info:
  title: E-Commerce REST API
  description: |
    REST API for an e-commerce platform with JWT authentication and checkout.

    **Checkout rules:**
    - Only authenticated users can checkout
    - Payment methods: `cash` or `credit_card`
    - Cash payments receive a 10% discount on the subtotal
  version: 1.0.0

servers:
  - url: http://localhost:4000
    description: Local development server

tags:
  - name: Health
    description: Server health operations
  - name: Auth
    description: User registration and authentication
  - name: Checkout
    description: Order checkout (requires authentication)
  - name: Documentation
    description: API documentation

paths:
  /healthcheck:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the current server status.
      operationId: healthcheck
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                timestamp: '2026-06-15T12:00:00.000Z'

  /register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: Creates a new user account and returns a JWT token.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: newuser@example.com
              password: mypassword
              name: New User
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /login:
    post:
      tags:
        - Auth
      summary: Login
      description: Authenticates a user and returns a JWT token.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: alice@example.com
              password: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /checkout:
    post:
      tags:
        - Checkout
      summary: Place an order
      description: |
        Creates a checkout order for the authenticated user.
        Requires a valid JWT token in the Authorization header.
      operationId: checkout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
            examples:
              creditCard:
                summary: Credit card payment
                value:
                  items:
                    - productId: 1
                      quantity: 2
                    - productId: 3
                      quantity: 1
                  paymentMethod: credit_card
              cash:
                summary: Cash payment (10% discount)
                value:
                  items:
                    - productId: 2
                      quantity: 1
                  paymentMethod: cash
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '400':
          description: Invalid request, payment method, or insufficient stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing, invalid, or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /swagger:
    get:
      tags:
        - Documentation
      summary: Swagger UI
      description: Renders interactive API documentation from the OpenAPI specification.
      operationId: swaggerUi
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /login or /register

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: alice@example.com
        name:
          type: string
          example: Alice Johnson

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        name:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: JWT access token

    CheckoutItem:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2

    CheckoutRequest:
      type: object
      required:
        - items
        - paymentMethod
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CheckoutItem'
        paymentMethod:
          type: string
          enum:
            - cash
            - credit_card
          description: Cash payments receive a 10% discount

    OrderItem:
      type: object
      properties:
        productId:
          type: integer
        name:
          type: string
        unitPrice:
          type: number
          format: float
        quantity:
          type: integer
        lineTotal:
          type: number
          format: float

    CheckoutResponse:
      type: object
      properties:
        orderId:
          type: integer
        userId:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        paymentMethod:
          type: string
          enum:
            - cash
            - credit_card
        subtotal:
          type: number
          format: float
        discount:
          type: number
          format: float
          description: 10% of subtotal when paymentMethod is cash, otherwise 0
        total:
          type: number
          format: float

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
